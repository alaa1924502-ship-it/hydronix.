<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydronix Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 Heatmap Library -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI";}

body{display:flex;background:#f4f7fb;transition:0.3s;}

/* DARK MODE */
body.dark{background:#0f172a;color:white;}
body.dark .card{background:#1e293b;color:white;}
body.dark .sidebar{background:#111827;}

.sidebar{
width:230px;height:100vh;background:#003366;
color:white;padding:25px 15px;position:fixed;
}

.logo{font-size:22px;font-weight:bold;margin-bottom:40px;}

.sidebar a{
display:block;color:white;text-decoration:none;
padding:12px;margin-bottom:10px;border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#0077cc;
transform:translateX(5px);
}

.main{margin-left:230px;width:100%;padding:30px;}

.topbar{
display:flex;justify-content:space-between;align-items:center;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
background:#0077cc;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{background:#005fa3;transform:scale(1.05);}

#map{
height:320px;
margin-top:30px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">💧 Hydronix</div>
<a href="home.html">🏠 Home</a>
<a href="خريطة.html">🌧️ Rain Map</a>
<a href="analysis.html">📊 Analysis for investors</a>
<a href="how.html">⚙️ System</a>
<a href="#">ℹ️ About</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2>Dashboard 🌧️</h2>

<button onclick="toggleDark()" class="btn">🌙 Dark Mode</button>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
<h3>Rain Status</h3>
<p id="rain-status">Loading...</p>
</div>

<div class="card">
<h3>Water Saved</h3>
<p id="water">0 L 💧</p>
</div>

<div class="card">
<h3>System</h3>
<p id="system">Active ✅</p>
</div>

</div>

<!-- CHART -->
<canvas id="chart" style="margin-top:30px;"></canvas>

<!-- MAP -->
<div id="map"></div>

<!-- BUTTON -->
<button class="btn" style="margin-top:20px;" onclick="predictRain()">
Predict Rain 🤖
</button>

</div>

<script>

const API_KEY = "YOUR_API_KEY_HERE";

let map;

// ================= DARK MODE =================
function toggleDark(){
document.body.classList.toggle("dark");
}

// ================= WEATHER =================
async function loadWeather(){

const res = await fetch(
`https://api.openweathermap.org/data/2.5/forecast?q=Cairo&appid=${API_KEY}&units=metric`
);

const data = await res.json();

let labels = [];
let rainData = [];

for(let i=0;i<7;i++){
labels.push(data.list[i].dt_txt.split(" ")[0]);
rainData.push(data.list[i].rain?.["3h"] ?? 0);
}

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Rain",
data:rainData,
borderWidth:2
}]
}
});

document.getElementById("rain-status").innerText =
rainData[0] > 5 ? "Heavy 🌧️" : "Light ☀️";

let water = rainData[0] * 120;

document.getElementById("water").innerText =
Math.round(water) + " L 💧";

}

// ================= MAP + HEATMAP =================
async function loadMap(){

navigator.geolocation.getCurrentPosition(async(pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

map = L.map("map").setView([lat,lon],8);

L.tileLayer("https://tile.openstreetmap.de/{z}/{x}/{y}.png").addTo(map);

// marker
L.marker([lat,lon]).addTo(map)
.bindPopup("You are here 📍")
.openPopup();

// ================= WEATHER FOR LOCATION =================
const res = await fetch(
`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
);

const data = await res.json();

let rain = data.rain?.["1h"] ?? 0;

// ================= SAVE DATA =================
let history = JSON.parse(localStorage.getItem("rainHistory")) || [];

history.push({
lat: lat,
lon: lon,
rain: rain,
date: new Date().toISOString()
});

localStorage.setItem("rainHistory", JSON.stringify(history));

// ================= HEATMAP =================
let heatPoints = history.map(r => [
r.lat,
r.lon,
r.rain * 2
]);

L.heatLayer(heatPoints,{
radius:25,
blur:15,
maxZoom:10,
gradient:{
0.1:"blue",
0.4:"lime",
0.7:"yellow",
1:"red"
}
}).addTo(map);

});

}

// ================= AI =================
function predictRain(){
document.getElementById("rain-status").innerText =
"AI Prediction Running 🤖...";
}

// ================= INIT =================
loadWeather();
loadMap();

</script>

</body>
</html>
